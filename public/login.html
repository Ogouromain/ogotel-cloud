<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — OGOTEL Cloud</title>
  <meta name="description" content="Connectez-vous à votre espace OGOTEL Cloud pour gérer votre hôtel en Côte d'Ivoire.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">

  <!-- Supabase v2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CSS VARIABLES & RESET
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    :root {
      --green-primary: #1B5E20;
      --green-hover: #145218;
      --green-light: #F0F9F4;
      --green-dark: #0D1F0F;
      --green-glow: rgba(27,94,32,0.12);
      --gold-accent: #F9A825;
      --gold-hover: #E09600;
      --bg: #F3F4F6;
      --card-bg: #FFFFFF;
      --text-primary: #1C2B1E;
      --text-secondary: #6B7280;
      --text-placeholder: #9CA3AF;
      --white: #FFFFFF;
      --red: #DC2626;
      --red-light: #FEF2F2;
      --border: #E5E7EB;
      --border-focus: var(--green-primary);
      --shadow-card: 0 4px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-card-hover: 0 8px 32px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
      --radius: 10px;
      --radius-card: 16px;
      --radius-btn: 10px;
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-body);
      color: var(--text-primary);
      background: var(--bg);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    a { text-decoration: none; color: inherit; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       BACKGROUND PATTERN (subtle)
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(27,94,32,0.03) 1px, transparent 0);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* Green gradient orb top-right */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(27,94,32,0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       MAIN CONTAINER
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       LOGIN CARD
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .login-card {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 40px 36px;
      transition: box-shadow 0.4s ease;
    }
    .login-card:hover {
      box-shadow: var(--shadow-card-hover);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       LOGO & HEADER
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--green-primary), #2E7D32);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 4px 12px rgba(27,94,32,0.25);
    }
    .login-logo-text {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--green-primary);
      letter-spacing: -0.02em;
    }
    .login-logo-text .gold {
      color: var(--gold-accent);
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       FORM
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field-label {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .field-wrapper {
      position: relative;
    }
    .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-placeholder);
      pointer-events: none;
      transition: color 0.25s ease;
      display: flex;
      align-items: center;
    }
    .field-icon svg {
      width: 18px;
      height: 18px;
    }
    .field-input {
      width: 100%;
      padding: 13px 14px 13px 44px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--text-primary);
      background: var(--white);
      transition: var(--transition);
      outline: none;
    }
    .field-input::placeholder {
      color: var(--text-placeholder);
    }
    .field-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--green-glow);
    }
    .field-wrapper:focus-within .field-icon {
      color: var(--green-primary);
    }
    .field-input.has-error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.08);
    }
    .field-error {
      font-size: 0.78rem;
      color: var(--red);
      min-height: 0;
      overflow: hidden;
      transition: all 0.2s ease;
    }
    .field-error.visible {
      min-height: 20px;
      margin-top: 2px;
    }

    /* Password toggle */
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-placeholder);
      transition: var(--transition);
      display: flex;
      align-items: center;
      border-radius: 6px;
    }
    .password-toggle:hover {
      color: var(--green-primary);
      background: var(--green-light);
    }
    .password-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       REMEMBER / FORGOT ROW
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .form-options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: -4px;
    }
    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .checkbox-wrap input[type="checkbox"] {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      background: var(--white);
      cursor: pointer;
      position: relative;
      transition: var(--transition);
      flex-shrink: 0;
    }
    .checkbox-wrap input[type="checkbox"]:checked {
      background: var(--green-primary);
      border-color: var(--green-primary);
    }
    .checkbox-wrap input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 5px;
      height: 9px;
      border: 2px solid var(--white);
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }
    .checkbox-wrap input[type="checkbox"]:focus-visible {
      box-shadow: 0 0 0 3px var(--green-glow);
    }
    .checkbox-label {
      font-size: 0.84rem;
      color: var(--text-secondary);
      user-select: none;
    }
    .forgot-link {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--green-primary);
      transition: var(--transition);
    }
    .forgot-link:hover {
      color: var(--green-hover);
      text-decoration: underline;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SUBMIT BUTTON
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .submit-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: var(--radius-btn);
      background: var(--green-primary);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(27,94,32,0.2);
      position: relative;
      overflow: hidden;
      margin-top: 4px;
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--green-hover);
      box-shadow: 0 4px 16px rgba(27,94,32,0.3);
      transform: translateY(-1px);
    }
    .submit-btn:hover:not(:disabled)::before { opacity: 1; }
    .submit-btn:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(27,94,32,0.2);
    }
    .submit-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .submit-btn .btn-label {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .submit-btn .btn-label svg {
      transition: transform 0.25s ease;
    }
    .submit-btn:hover:not(:disabled) .btn-label svg {
      transform: translateX(2px);
    }
    .submit-btn .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(255,255,255,0.25);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .submit-btn.loading .btn-label { display: none; }
    .submit-btn.loading .spinner { display: block; }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       ERROR BOX
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .form-error-box {
      display: none;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      background: var(--red-light);
      border: 1px solid rgba(220,38,38,0.12);
      border-radius: var(--radius);
      animation: errorShake 0.4s ease;
      margin-bottom: 4px;
    }
    .form-error-box.visible { display: flex; }
    .form-error-box .error-icon {
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .form-error-box .error-text {
      font-size: 0.84rem;
      color: #991B1B;
      line-height: 1.5;
    }
    @keyframes errorShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       DIVIDER
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 0.8rem;
      color: var(--text-placeholder);
      white-space: nowrap;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       REGISTER ROW
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .register-row {
      text-align: center;
    }
    .register-row p {
      font-size: 0.88rem;
      color: var(--text-secondary);
    }
    .register-link {
      font-weight: 700;
      color: var(--green-primary);
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .register-link:hover {
      color: var(--green-hover);
    }
    .register-link svg {
      width: 15px;
      height: 15px;
      transition: transform 0.25s ease;
    }
    .register-link:hover svg {
      transform: translateX(3px);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       FOOTER
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.78rem;
      color: var(--text-placeholder);
    }
    .login-footer a {
      color: var(--green-primary);
      font-weight: 600;
      transition: var(--transition);
    }
    .login-footer a:hover {
      color: var(--green-hover);
    }

    /* Back link (visible on all sizes) */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 28px;
      transition: var(--transition);
      padding: 4px 0;
    }
    .back-link:hover {
      color: var(--green-primary);
    }
    .back-link svg {
      width: 16px;
      height: 16px;
      transition: transform 0.25s ease;
    }
    .back-link:hover svg {
      transform: translateX(-3px);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       ANIMATIONS
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .fade-up-delay-1 { animation-delay: 0.1s; }
    .fade-up-delay-2 { animation-delay: 0.2s; }
    .fade-up-delay-3 { animation-delay: 0.3s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RESPONSIVE
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @media (max-width: 480px) {
      body {
        padding: 0;
        justify-content: flex-start;
        padding-top: 20px;
      }
      .login-container {
        padding: 0 16px;
      }
      .login-card {
        padding: 32px 24px;
        border-radius: 14px;
      }
      .login-logo-text {
        font-size: 1.4rem;
      }
      .login-logo-icon {
        width: 38px;
        height: 38px;
        font-size: 1.1rem;
        border-radius: 10px;
      }
      .form-options-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      .forgot-link {
        align-self: flex-end;
        margin-top: -6px;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <!-- Back to landing -->
    <a href="landing.html" class="back-link fade-up">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Retour à l'accueil
    </a>

    <!-- Login Card -->
    <div class="login-card fade-up fade-up-delay-1">

      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">🏨</div>
        <div class="login-logo-text">OGOTEL <span class="gold">Cloud</span></div>
      </div>

      <!-- Header -->
      <div class="card-header">
        <h2 class="card-title">Connectez-vous à votre espace de gestion</h2>
      </div>

      <!-- Error box (hidden by default) -->
      <div class="form-error-box" id="formErrorBox">
        <span class="error-icon">❌</span>
        <div class="error-text" id="formErrorText">
          Email ou mot de passe incorrect.<br>Vérifiez vos identifiants.
        </div>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm" novalidate>

        <!-- Email -->
        <div class="field-group">
          <label class="field-label" for="email">Adresse email</label>
          <div class="field-wrapper">
            <span class="field-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </span>
            <input
              type="email"
              class="field-input"
              id="email"
              name="email"
              placeholder="votre@email.com"
              autocomplete="email"
              required
            >
          </div>
          <div class="field-error" id="emailError"></div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="field-label" for="password">Mot de passe</label>
          <div class="field-wrapper">
            <span class="field-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input
              type="password"
              class="field-input"
              id="password"
              name="password"
              placeholder="Votre mot de passe"
              autocomplete="current-password"
              required
              style="padding-right: 48px;"
            >
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Afficher le mot de passe">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
            </button>
          </div>
          <div class="field-error" id="passwordError"></div>
        </div>

        <!-- Remember / Forgot -->
        <div class="form-options-row">
          <label class="checkbox-wrap">
            <input type="checkbox" id="remember" name="remember">
            <span class="checkbox-label">Se souvenir de moi</span>
          </label>
          <a href="#" class="forgot-link">Mot de passe oublié ?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-label">
            Se connecter
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </span>
          <div class="spinner"></div>
        </button>

      </form>

      <!-- Divider -->
      <div class="divider">
        <span>ou</span>
      </div>

      <!-- Register link -->
      <div class="register-row">
        <p>Pas encore de compte ?</p>
        <a href="register.html" class="register-link">
          Demander l'accès
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </a>
      </div>

    </div>

    <!-- Footer -->
    <div class="login-footer fade-up fade-up-delay-3">
      &copy; 2025 <a href="landing.html">OGOTEL Cloud</a> — Fait avec &#10084;&#65039; en Côte d'Ivoire &#127465;&#127475;
    </div>
  </div>


  <!-- ═══════════════════════════════════════════
       JAVASCRIPT
       ═══════════════════════════════════════════ -->
  <script>
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // ⚠️  SUPABASE CONFIGURATION — SÉCURITÉ
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    //
    // IMPORTANT : SEULEMENT la clé ANON est utilisée ici.
    // La clé ANON (publique) permet uniquement les opérations
    // autorisées par les politiques RLS de Supabase.
    //
    // La SERVICE ROLE KEY (clé secrète) ne doit JAMAIS être
    // exposée côté client/navigateur. Elle contourne RLS et
    // donne un accès complet à la base de données.
    // Elle doit uniquement être utilisée côté serveur.
    //
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    const SUPABASE_URL = 'https://pblizpjhsvctsrzzculc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBibGl6cGpoc3ZjdHNyenpjdWxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDc0MDIsImV4cCI6MjA5NTAyMzQwMn0.O-e_FLsNr-6dUcJOuGiQKLibvzcrXC_Vid7m9eK4b9o';

    // NEVER expose this in frontend code:
    // const SERVICE_ROLE_KEY = '...'; ← JAMAIS DANS LE NAVIGATEUR !

    let supabase = null;

    function initSupabase() {
      try {
        if (window.supabase && window.supabase.createClient) {
          supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          console.log('✅ Supabase client initialized (ANON key only).');
        } else {
          console.warn('⚠️ Supabase library not loaded.');
        }
      } catch (err) {
        console.error('❌ Supabase init error:', err);
      }
    }


    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // PASSWORD TOGGLE
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('passwordToggle');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyeOffIcon = document.getElementById('eyeOffIcon');

    passwordToggle.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.style.display = isPassword ? 'none' : 'block';
      eyeOffIcon.style.display = isPassword ? 'block' : 'none';
      passwordToggle.setAttribute(
        'aria-label',
        isPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'
      );
    });


    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // FIELD VALIDATION
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    const emailInput = document.getElementById('email');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const formErrorBox = document.getElementById('formErrorBox');
    const formErrorText = document.getElementById('formErrorText');

    function validateEmail(value) {
      if (!value.trim()) return 'Veuillez entrer votre email.';
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value.trim())) {
        return 'Veuillez entrer un email valide.';
      }
      return '';
    }

    function validatePassword(value) {
      if (!value) return 'Veuillez entrer votre mot de passe.';
      if (value.length < 6) return 'Le mot de passe doit contenir au moins 6 caractères.';
      return '';
    }

    function showFieldError(input, errorEl, message) {
      if (message) {
        input.classList.add('has-error');
        errorEl.textContent = message;
        errorEl.classList.add('visible');
      } else {
        input.classList.remove('has-error');
        errorEl.textContent = '';
        errorEl.classList.remove('visible');
      }
    }

    function hideFormError() {
      formErrorBox.classList.remove('visible');
    }

    function showFormError(message) {
      formErrorText.innerHTML = message;
      formErrorBox.classList.add('visible');
    }

    // Real-time validation on blur/input
    emailInput.addEventListener('blur', () => {
      showFieldError(emailInput, emailError, validateEmail(emailInput.value));
      hideFormError();
    });
    emailInput.addEventListener('input', () => {
      if (emailInput.classList.contains('has-error')) {
        showFieldError(emailInput, emailError, validateEmail(emailInput.value));
      }
      hideFormError();
    });
    passwordInput.addEventListener('blur', () => {
      showFieldError(passwordInput, passwordError, validatePassword(passwordInput.value));
      hideFormError();
    });
    passwordInput.addEventListener('input', () => {
      if (passwordInput.classList.contains('has-error')) {
        showFieldError(passwordInput, passwordError, validatePassword(passwordInput.value));
      }
      hideFormError();
    });


    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // FORM SUBMIT — Authentification
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Hide previous errors
      hideFormError();

      // Validate fields
      const emailMsg = validateEmail(emailInput.value);
      const passwordMsg = validatePassword(passwordInput.value);
      let hasError = false;

      if (emailMsg) { showFieldError(emailInput, emailError, emailMsg); hasError = true; }
      if (passwordMsg) { showFieldError(passwordInput, passwordError, passwordMsg); hasError = true; }

      if (hasError) return;

      // Loading state
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      try {
        if (!supabase) {
          throw new Error('Supabase non initialisé. Vérifiez votre connexion internet.');
        }

        // ── Step 1: Authenticate with email/password ──
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          // Handle specific error messages
          if (error.message.includes('Invalid login') || error.message.includes('Invalid credentials')) {
            showFormError('Email ou mot de passe incorrect.<br>Vérifiez vos identifiants.');
          } else if (error.message.includes('Email not confirmed')) {
            showFormError('Votre email n\'a pas été confirmé.<br>Vérifiez votre boîte de réception.');
          } else if (error.message.includes('Too many requests')) {
            showFormError('Trop de tentatives.<br>Attendez quelques instants puis réessayez.');
          } else {
            showFormError('Email ou mot de passe incorrect.<br>Vérifiez vos identifiants.');
          }
          return;
        }

        if (!data || !data.user) {
          showFormError('Une erreur inattendue est survenue.<br>Veuillez réessayer.');
          return;
        }

        // ── Step 2: Fetch user profile to determine role ──
        let userRole = null;

        try {
          const { data: profile, error: profileError } = await supabase
            .from('user_profiles')
            .select('role')
            .eq('id', data.user.id)
            .single();

          if (!profileError && profile) {
            userRole = profile.role;
          }
        } catch (profileErr) {
          console.warn('Could not fetch user profile:', profileErr);
        }

        // ── Step 3: Redirect based on role ──
        if (userRole === 'super_admin') {
          window.location.href = 'admin/super-admin.html';
        } else if (userRole === 'hotel_admin' || userRole === 'receptionist') {
          window.location.href = 'dashboard.html';
        } else {
          // No profile found, redirect to registration
          window.location.href = 'register.html';
        }

      } catch (err) {
        console.error('Login error:', err);
        showFormError('Une erreur est survenue.<br>Veuillez vérifier votre connexion et réessayer.');
      } finally {
        // Re-enable button
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
      }
    });


    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // INIT
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    document.addEventListener('DOMContentLoaded', () => {
      initSupabase();
    });
  </script>

</body>
